<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#1a56db"/>
  
  <!-- Document shape (white, slightly transparent) -->
  <rect x="18" y="12" width="28" height="36" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="18" y="12" width="20" height="36" rx="3" fill="rgba(255,255,255,0.1)"/>
  
  <!-- "IR" letters in white -->
  <text x="32" y="42" 
    font-family="Inter, Arial, sans-serif" 
    font-weight="900" 
    font-size="22" 
    fill="white" 
    text-anchor="middle" 
    letter-spacing="-1">IR</text>
    
  <!-- Small green checkmark dot at bottom right -->
  <circle cx="48" cy="48" r="8" fill="#10b981"/>
  <text x="48" y="52" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="700">✓</text>
</svg>
